<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Tubarr: Download</title>
</head>

<body>

    <div class="container flex flex-col gap-4">
        <a href="/" class="nav-link">Home</a>
        <a href="/jobs" class="nav-link">Jobs</a>

        <div>
            <h1 class="text-2xl">Download</h1>
            <p class="text-sm text-muted">Async yt-dlp download job</p>
        </div>

        <!-- URL -->
        <div class="flex flex-col gap-1">
            <label class="text-sm text-muted">URL</label>
            <input id="url" class="input" placeholder="https://youtube.com/..." />
        </div>

        <!-- Output Dir -->
        <div class="flex flex-col gap-1">
            <label class="text-sm text-muted">Output Directory</label>
            <input id="output_dir" class="input" placeholder="downloads / music / phonk" value="downloads" />
        </div>

        <!-- filename template -->
        <div class="flex flex-col gap-1">
            <label class="text-sm text-muted">Filename Template</label>
            <input id="filename_template" class="input font-mono" placeholder="%(title)s.%(ext)s"
                value="%(title)s.%(ext)s" />
        </div>

        <!-- audio format -->
        <div class="flex flex-col gap-1">
            <label class="text-sm text-muted">Audio Format</label>
            <input id="audio_format" class="input" placeholder="mp3 / flac / wav" value="mp3" />
        </div>

        <!-- checkboxes -->
        <div class="grid grid-3 gap-2">

            <label class="flex items-center gap-2">
                <input type="checkbox" id="audio_only" checked />
                <span class="text-sm">Audio Only</span>
            </label>

            <label class="flex items-center gap-2">
                <input type="checkbox" id="embed_metadata" checked />
                <span class="text-sm">Embed Metadata</span>
            </label>

            <label class="flex items-center gap-2">
                <input type="checkbox" id="embed_thumbnail" />
                <span class="text-sm">Embed Thumbnail</span>
            </label>

            <label class="flex items-center gap-2">
                <input type="checkbox" id="add_metadata" checked />
                <span class="text-sm">Add Metadata</span>
            </label>

            <label class="flex items-center gap-2">
                <input type="checkbox" id="move_after" checked />
                <span class="text-sm">Move After</span>
            </label>

        </div>

        <!-- extra args -->
        <div class="flex flex-col gap-1">
            <label class="text-sm text-muted">Extra yt-dlp args (one per line)</label>
            <textarea id="extra_args" class="input font-mono" rows="4"
                placeholder="--yes-playlist&#10;--ignore-errors"></textarea>
        </div>

        <!-- button -->
        <div class="flex gap-2">
            <button id="downloadBtn" class="btn">Start Download</button>
            <div id="status" class="text-sm text-muted flex items-center"></div>
        </div>

    </div>
    <script src="{{ url_for('static', filename='js/download.js') }}"></script>
</body>

</html>
