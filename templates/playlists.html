<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Tubarr - Playlists</title>
</head>

<body>
    <div class="container flex flex-col gap-4">

        <!-- Navigation -->
        <div class="container">
            <a href="/" class="nav-link">Home</a>
            <a href="/jobs" class="nav-link">Jobs</a>
            <a href="/settings" class="nav-link">Settings</a>
            <a href="/playlists" class="nav-link">Playlists</a>
        </div>

        <!-- Header -->
        <div>
            <h1 class="text-2xl">Playlists</h1>
            <p class="text-sm text-muted">
                Track YouTube playlists and automatically download new videos
            </p>
        </div>

        <!-- Add Playlist Form -->
        <div class="card p-3 flex flex-col gap-3">

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Playlist URL</label>
                <input id="url" class="input" type="url" placeholder="https://youtube.com/playlist?list=..." />
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Output Directory</label>
                <input id="output_dir" class="input" placeholder="downloads/music" value="downloads" />
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Filename Template</label>
                <input id="filename_template" class="input font-mono"
                    placeholder="%(playlist_title)s/%(playlist_index)03d - %(title)s [%(id)s].%(ext)s"
                    value="%(playlist_title)s/%(playlist_index)03d - %(title)s [%(id)s].%(ext)s" />
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Audio Format</label>
                <select id="audio_format" class="input">
                    <option value="mp3">MP3</option>
                    <option value="m4a">M4A</option>
                    <option value="flac">FLAC</option>
                    <option value="wav">WAV</option>
                </select>
            </div>

            <!-- Options -->
            <div class="grid grid-2 gap-2">

                <label class="flex items-center gap-2">
                    <input type="checkbox" id="audio_only" />
                    <span class="text-sm">Audio Only</span>
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" id="embed_metadata" checked />
                    <span class="text-sm">Embed Metadata</span>
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" id="embed_thumbnail" checked />
                    <span class="text-sm">Embed Thumbnail</span>
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" id="add_metadata" checked />
                    <span class="text-sm">Add Metadata</span>
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" id="move_after" checked />
                    <span class="text-sm">Move After Download</span>
                </label>

            </div>

            <!-- Extra Args -->
            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">Extra yt-dlp Args (one per line)</label>
                <textarea id="extra_args" class="input font-mono" rows="3"
                    placeholder="--playlist-reverse&#10;--write-info-json"></textarea>
            </div>

            <!-- Actions -->
            <div class="flex gap-2 items-center">
                <button id="addBtn" class="btn">Add Playlist</button>
                <div id="status" class="text-sm text-muted"></div>
            </div>

        </div>

        <!-- Tracked Playlists -->
        <div class="flex justify-between items-center">
            <h2 class="text-lg">Tracked Playlists</h2>
            <button id="refreshBtn" class="btn">Refresh</button>
        </div>

        <div id="playlists" class="flex flex-col gap-2">
            <p class="text-sm text-muted">No playlists added yet.</p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/playlists.js') }}"></script>
</body>

</html>
