<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Tubarr</title>
</head>

<body>
    <div class="container flex flex-col gap-4">
        <a href="/jobs" class="nav-link">Jobs</a>
        <a href="/channels" class="nav-link">Channels</a>
        <a href="/" class="nav-link">Home</a>

        <div>
            <h1 class="text-2xl">Settings</h1>
            <p class="text-sm text-muted">Background task intervals</p>
        </div>

        <div class="card p-3 flex flex-col gap-3">

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">
                    Channel Scan Interval (seconds)
                </label>
                <input id="channel_scan_interval" class="input font-mono" type="number" />
                <div class="text-xs text-muted">
                    How often to check subscribed channels
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-muted">
                    Thumbnail Cache Interval (seconds)
                </label>
                <input id="generate_thumbnail_cache_interval" class="input font-mono" type="number" />
                <div class="text-xs text-muted">
                    How often to regenerate thumbnail cache
                </div>
            </div>

            <div class="flex gap-2">
                <button id="saveBtn" class="btn">Save Settings</button>
                <div id="status" class="text-sm text-muted flex items-center"></div>
            </div>

        </div>

    </div>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>

</html>
